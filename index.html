<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blush Calendar</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .calendar {
    width: 360px;
    padding: 16px;
    border-radius: 16px;
    background: transparent;
    box-shadow: inset 0 0 0 1px #ECECEC;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #F2E8EC; /* soft blush pink */
    padding: 10px 14px;
    border-radius: 12px;
    margin-bottom: 12px;
  }

  .header button {
    border: none;
    background: none;
    font-size: 18px;
    cursor: pointer;
    color: #1F1F1F;
  }

  .month-year {
    font-weight: 600;
    color: #1F1F1F;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: 6px;
    font-size: 12px;
    color: #7A7A7A;
  }

  .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .days div {
    padding: 8px 0;
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    color: #1F1F1F;
  }

  .muted {
    color: #D6C8CD; /* soft faded pink-grey */
  }

  .today {
    background: #E8D7DD; /* slightly deeper blush */
    font-weight: 600;
  }
</style>
</head>

<body>

<div class="calendar">
  <div class="header">
    <button onclick="changeMonth(-1)">‹</button>
    <div id="monthYear" class="month-year"></div>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <div class="weekdays">
    <div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
  </div>

  <div class="days" id="days"></div>
</div>

<script>
  let currentDate = new Date();

  function renderCalendar() {
    const monthYear = document.getElementById("monthYear");
    const daysContainer = document.getElementById("days");
    daysContainer.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    monthYear.textContent = currentDate.toLocaleDateString("en-US", {
      month: "long",
      year: "numeric"
    });

    const firstDay = new Date(year, month, 1).getDay();
    const startDay = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const prevMonthDays = new Date(year, month, 0).getDate();

    for (let i = startDay; i > 0; i--) {
      const d = document.createElement("div");
      d.className = "muted";
      d.textContent = prevMonthDays - i + 1;
      daysContainer.appendChild(d);
    }

    for (let i = 1; i <= daysInMonth; i++) {
      const d = document.createElement("div");
      d.textContent = i;

      const today = new Date();
      if (
        i === today.getDate() &&
        month === today.getMonth() &&
        year === today.getFullYear()
      ) {
        d.classList.add("today");
      }

      daysContainer.appendChild(d);
    }

    const totalCells = startDay + daysInMonth;
    const remaining = 7 * Math.ceil(totalCells / 7) - totalCells;

    for (let i = 1; i <= remaining; i++) {
      const d = document.createElement("div");
      d.className = "muted";
      d.textContent = i;
      daysContainer.appendChild(d);
    }
  }

  function changeMonth(direction) {
    currentDate.setMonth(currentDate.getMonth() + direction);
    renderCalendar();
  }

  renderCalendar();
</script>

</body>
</html>
